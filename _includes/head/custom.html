{% include base_path %}

<!-- start custom head snippets -->

<!-- Support for Academicons -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>

<!-- favicon from https://commons.wikimedia.org/wiki/File:OOjs_UI_icon_academic-progressive.svg -->
<link rel="apple-touch-icon" sizes="180x180" href="{{ base_path }}/images/apple-touch-icon-180x180.png"/>
<link rel="icon" type="image/svg+xml" href="{{ base_path }}/images/favicon.svg"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-32x32.png" sizes="32x32"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-192x192.png" sizes="192x192"/>
<link rel="manifest" href="{{ base_path }}/images/manifest.json"/>
<link rel="icon" href="/images/favicon.ico"/>
<meta name="theme-color" content="#ffffff"/>

<!-- Google Fonts: Inter (body) + Merriweather (headings) -->
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Merriweather:ital,wght@0,700;1,400&display=swap"/>

<!-- Open Graph / SEO -->
{% if page.description %}<meta name="description" content="{{ page.description }}"/>{% endif %}
<meta property="og:title" content="{{ page.title | default: site.title }}"/>
<meta property="og:description" content="{{ page.description | default: site.description }}"/>
{% if site.og_image %}<meta property="og:image" content="{{ site.url }}{{ site.og_image }}"/>{% endif %}

<!-- Lightbox for image popups -->
<script defer src="{{ base_path }}/assets/js/lightbox.js"></script>

<!-- Site-wide enhancements (progress bar, back-to-top, citation copy, lightbox arrows) -->
<script defer src="{{ base_path }}/assets/js/site-enhancements.js"></script>

<!-- end custom head snippets -->
